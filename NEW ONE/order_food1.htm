<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Food Ordering System</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f3f5;
            padding: 20px;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        header p {
            font-size: 14px;
            color: #bdc3c7;
        }

        /* Live Sheet Embed Wrapper */
        .sheet-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }

        .sheet-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .iframe-container {
            position: relative;
            width: 100%;
            height: 600px; /* Desktop එකට සරිලන උස */
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Quick Action Buttons */
        .action-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-open-direct {
            background-color: #107c41;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-open-direct:hover {
            background-color: #0a5c30;
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .iframe-container {
                height: 450px; /* Mobile ෆෝන් වලට සරිලන උස */
            }
            .action-bar {
                flex-direction: column;
            }
            .btn-open-direct {
                text-align: center;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div class="admin-container">
    
    <header>
        <h1>Food Order - Admin Management Dashboard</h1>
        <p>දිනපතා ඇණවුම් සහ මුළු එකතුව (Totals) මෙතැනින් පරීක්ෂා කරන්න.</p>
    </header>

    <div class="action-bar">
        <a href="https://docs.google.com/spreadsheets/d/1xXbimXkfmkhE1B4uxd63Nsbln06RJ1kFsxVCPWWLZag/edit?usp=sharing" target="_blank" class="btn-open-direct">
            🟢 Open in Google Sheets App (කෙලින්ම Sheet එකෙන් බලන්න)
        </a>
    </div>

    <div class="sheet-card">
        <div class="sheet-title">📊 Live Orders & Totals Log</div>
        <div class="iframe-container">
            <iframe src="https://docs.google.com/spreadsheets/d/1xXbimXkfmkhE1B4uxd63Nsbln06RJ1kFsxVCPWWLZag/edit?usp=sharing"></iframe>
        </div>
    </div>

</div>

</body>
</html>
